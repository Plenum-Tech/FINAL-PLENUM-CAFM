worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    client_max_body_size 200m;
    client_header_buffer_size 16k;
    large_client_header_buffers 8 64k;

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Doc upload ingestion (Claude PDF) can run many minutes in the background;
        # keep proxy timeouts high for any remaining synchronous API calls.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_request_buffering off;
        proxy_ssl_server_name on;

        # ── Local FastAPI services (same pattern as cafm-connector-service-final/deploy/nginx.conf) ──
        location /backend/connector/ {
            proxy_pass http://127.0.0.1:8000/;
        }

        location /backend/schema-mapper/ {
            proxy_pass http://127.0.0.1:8003/;
        }

        location /backend/doc-rag/ {
            proxy_pass http://127.0.0.1:8004/;
        }

        location /backend/work-order/ {
            proxy_pass http://127.0.0.1:8007/;
        }

        location /backend/udr/ {
            proxy_pass http://127.0.0.1:8006/;
        }

        location /backend/deep-agents/ {
            proxy_pass http://127.0.0.1:8008/;
        }

        # Next.js standalone
        location / {
            proxy_pass http://127.0.0.1:3000;
        }

        location = /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
