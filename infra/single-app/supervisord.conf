[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
command=node server.js
directory=/app/frontend
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:connector]
command=uvicorn cafm_connector.api.app:app --host 127.0.0.1 --port 8000 --root-path /backend/connector --proxy-headers --forwarded-allow-ips=*
directory=/build/cafm-connector-service
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:schema-mapper]
command=uvicorn src.app:app --host 127.0.0.1 --port 8003 --root-path /backend/schema-mapper --proxy-headers --forwarded-allow-ips=*
directory=/build/svc-ai-schema-mapper
environment=DEBUG="true"
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:doc-rag]
command=uvicorn app.main:app --host 127.0.0.1 --port 8004 --root-path /backend/doc-rag --proxy-headers --forwarded-allow-ips=*
directory=/build/doc-rag-main
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:work-order]
command=uvicorn src.app:app --host 127.0.0.1 --port 8007 --root-path /backend/work-order --proxy-headers --forwarded-allow-ips=*
directory=/build/svc-work-order-management
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:udr]
command=uvicorn src.app:app --host 127.0.0.1 --port 8006 --root-path /backend/udr --proxy-headers --forwarded-allow-ips=*
directory=/build/svc-udr
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:deep-agents]
command=uvicorn src.api.main:app --host 127.0.0.1 --port 8008 --root-path /backend/deep-agents --proxy-headers --forwarded-allow-ips=*
directory=/build/svc-deepagents
