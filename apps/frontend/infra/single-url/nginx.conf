server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 200m;
    # Browser auth cookies / JWTs can exceed default 8k combined header limit → nginx 400
    client_header_buffer_size 16k;
    large_client_header_buffers 8 64k;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_request_buffering off;
    proxy_ssl_server_name on;

    # Public path contract:
    #   /                -> frontend
    #   /backend/*       -> backend
    #
    location /backend/work-order/ {
        proxy_pass http://backend-app:8007/;
    }

    # Local schema-mapper service (docs enabled for localhost use)
    location /backend/schema-mapper/ {
        proxy_pass http://schema-mapper-app:8003/;
    }

    # doc-rag routes are exposed from the same schema-mapper service under /doc-rag/*
    location /backend/doc-rag/ {
        proxy_pass http://schema-mapper-app:8003/doc-rag/;
    }

    # doc-rag docs are surfaced by the schema-mapper app docs endpoint.
    location = /backend/doc-rag/docs {
        proxy_pass http://schema-mapper-app:8003/docs;
    }

    location = /backend/doc-rag/docs/ {
        proxy_pass http://schema-mapper-app:8003/docs;
    }

    location = /backend/doc-rag/openapi.json {
        proxy_pass http://schema-mapper-app:8003/openapi.json;
    }

    # Local CAFM connector (docker-compose connector-app)
    location /backend/connector/ {
        proxy_pass http://connector-app:8000/;
    }

    location /backend/udr/ {
        proxy_pass http://svc-udr:8006/;
    }

    location /backend/deep-agents/ {
        proxy_pass http://svc-deepagents:8008/;
    }

    location / {
        proxy_pass http://frontend-app:3000;
    }

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
