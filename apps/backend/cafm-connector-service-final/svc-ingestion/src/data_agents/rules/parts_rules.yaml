# parts_rules.yaml
# EL-5.CONSTRAIN hard rules for Parts Agent
# Hard rules ALWAYS override AI vote — no exceptions.
# Known state: 19 parts below min, MOTOR-8HP at 0 (CRITICAL).

rules:
  - name: zero_stock_critical
    description: >
      Stock on hand = 0 → urgency = critical (always).
      AI cannot override this. MOTOR-8HP is currently at 0.
    conditions:
      - type: any_row_where
        field: stock_on_hand
        operator: eq
        value: 0
    action:
      set_status: critical

  - name: below_25_percent_minimum_severe
    description: >
      Stock < 25% of minimum_allowed_stock → urgency = severe (always).
    conditions:
      - type: any_row_where
        field: below_25_pct_minimum
        operator: eq
        value: true
    action:
      set_status: severe

  - name: linked_to_highest_priority_wo_bump
    description: >
      Part linked to asset with open Highest priority WO → bump urgency.
      low→severe, severe→critical. Applied after base urgency is set.
    conditions:
      - type: any_row_where
        field: linked_asset_has_highest_wo
        operator: eq
        value: true
      - type: any_row_where
        field: stock_on_hand
        operator: gt
        value: 0
    action:
      set_status: severe
      requires_human_review: false
