# Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template_location =

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to dateutc() and datetime.datetime.now()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in _alembic_version
# compared to the length of branch_labels and revision_id
# "alembic_version" table name will be truncated if this is too long
# defaults to the eventually configured length of the
# revision_id column: 40
# (Note: effective in Alembic 1.4 and beyond)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Logging level used to initialize logging.configure_logging()
log_level = INFO

# [loggers]
