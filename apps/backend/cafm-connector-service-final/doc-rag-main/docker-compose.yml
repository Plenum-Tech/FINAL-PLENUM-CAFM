# ============================================================
# RAG Platform - Docker Compose
# Runs three services: Postgres+pgvector, FastAPI backend, Streamlit UI.
#
# Usage:
#   docker compose up --build           # build + run everything
#   docker compose up -d                # run in background
#   docker compose logs -f api          # tail API logs
#   docker compose down                 # stop everything
#   docker compose down -v              # stop + wipe DB volume
# ============================================================
services:

  # ---------- PostgreSQL with pgvector extension ----------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_platform"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------- FastAPI backend ----------
  api:
    build: .
    container_name: rag_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO

      # Use Postgres+pgvector (not SQLite) inside Docker
      USE_SQLITE_DEV: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_platform

      # Leave blank = mock embeddings + mock answerer (no API key needed).
      # Put your real key here (or in a .env file loaded by compose) for
      # real OpenAI embeddings and answer generation.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_PDF_MODEL: claude-sonnet-4-6

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIM: "1536"
      OPENAI_LLM_MODEL: gpt-4o-mini

      UPLOAD_DIR: /app/data/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./logs:/app/logs
    # Run init_db before starting the server so tables are created
    command: >
      sh -c "python -m scripts.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ---------- Streamlit test UI ----------
  ui:
    build: .
    container_name: rag_ui
    depends_on:
      api:
        condition: service_started
    environment:
      RAG_API_BASE: http://api:8000
    ports:
      - "8501:8501"
    command: >
      streamlit run streamlit_app/app.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
        --browser.gatherUsageStats false
    restart: unless-stopped

volumes:
  pg_data:
