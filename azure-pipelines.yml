# Docker — build and push unified CAFM image to Azure Container Registry
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  - master

resources:
  - repo: self

variables:
  dockerRegistryServiceConnection: 'ddf55703-2d1d-49bf-82e9-e10f06197f7e'
  imageRepository: 'finalplenumcafm'
  containerRegistry: 'agentapi.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile.single-app'
  buildContext: '$(Build.SourcesDirectory)'
  tag: 'latest'
  vmImageName: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: Build and push stage
    jobs:
      - job: Build
        displayName: Build
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: Docker@2
            displayName: Build and push an image to container registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              buildContext: $(buildContext)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
